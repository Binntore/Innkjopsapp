/* Statistics Page */
function Statistics(){
  const {notify} = useApp();
  const [tab, setTab] = useState('oversikt');
  const today = new Date();
  const thisYearFrom = `${today.getFullYear()}-01-01`;
  const todayStr = today.toISOString().slice(0,10);
  const lastYearFrom = `${today.getFullYear()-1}-01-01`;
  const lastYearTo = `${today.getFullYear()-1}-12-31`;

  const PRESETS = [
    { label:'Denne mnd', from:`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-01`, to:todayStr },
    { label:'Forrige mnd', from:new Date(today.getFullYear(),today.getMonth()-1,1).toISOString().slice(0,10), to:new Date(today.getFullYear(),today.getMonth(),0).toISOString().slice(0,10) },
    { label:'I år', from:thisYearFrom, to:todayStr },
    { label:'Forrige år', from:lastYearFrom, to:lastYearTo },
    { label:'Siste 3 mnd', from:new Date(today.getFullYear(),today.getMonth()-3,today.getDate()).toISOString().slice(0,10), to:todayStr },
    { label:'Siste 12 mnd', from:new Date(today.getFullYear()-1,today.getMonth(),today.getDate()).toISOString().slice(0,10), to:todayStr },
  ];

  const [from, setFrom] = useState(PRESETS[2].from);
  const [to, setTo] = useState(PRESETS[2].to);
  const [cmpFrom, setCmpFrom] = useState(PRESETS[3].from);
  const [cmpTo, setCmpTo] = useState(PRESETS[3].to);
  const [showCmp, setShowCmp] = useState(false);
  const [activePreset, setActivePreset] = useState(2);
  const [data, setData] = useState(null);
  const [cmpData, setCmpData] = useState(null);
  const [loadingData, setLoadingData] = useState(false);
  const [error, setError] = useState('');

  const TABS = [{id:'oversikt',label:'Oversikt'},{id:'produkt',label:'Per produkt'},{id:'kunde',label:'Per kunde'},{id:'tid',label:'Over tid'},{id:'fakturaer',label:'Fakturaer'}];

  const krS = n => { const v=Number(n||0); if(v>=1000000) return `kr ${(v/1000000).toFixed(1)}M`; if(v>=1000) return `kr ${(v/1000).toFixed(1)}k`; return `kr ${v.toLocaleString('nb-NO',{maximumFractionDigits:0})}`; };
  const pct = (a,b) => b ? ((a-b)/b*100).toFixed(1) : null;
  const fmtD = d => d ? new Date(d).toLocaleDateString('nb-NO',{day:'2-digit',month:'2-digit',year:'numeric'}) : '—';

  // Simple SVG charts (no external dependency needed)
  const hasCharts = true;
  // Minimal chart components implemented with SVG
  const SimpleBarChart = ({data, valueKey='revenue', labelKey='label', height=260, colors, formatter}) => {
    if (!data || !data.length) return null;
    const max = Math.max(...data.map(d=>d[valueKey]||0), 1);
    const W = 100/data.length;
    const COLORS2 = colors || ['#1B5E3B','#3B82F6','#F59E0B','#EF4444','#8B5CF6','#EC4899','#14B8A6','#F97316'];
    return <div style={{position:'relative',width:'100%',height:height,overflow:'hidden'}}>
      <svg width="100%" height={height} viewBox={`0 0 ${data.length*60} ${height}`} preserveAspectRatio="none" style={{position:'absolute',top:0,left:0}}>
        {data.map((d,i) => {
          const barH = Math.max(2, ((d[valueKey]||0)/max)*(height-40));
          const x = i*60+6; const barW = 48;
          const y = height-40-barH;
          return <g key={i}>
            <rect x={x} y={y} width={barW} height={barH} rx={3} fill={COLORS2[i%COLORS2.length]} opacity={0.9}/>
          </g>;
        })}
      </svg>
      <div style={{position:'absolute',bottom:0,left:0,right:0,display:'flex',height:38}}>
        {data.map((d,i)=><div key={i} style={{flex:1,fontSize:9,color:'var(--txt3)',textAlign:'center',padding:'2px 1px',overflow:'hidden',lineHeight:1.2}}>{(d[labelKey]||'').slice(0,10)}</div>)}
      </div>
    </div>;
  };
  const SimpleGroupedChart = ({data, key1='current', key2='compare', labelKey='label', height=260}) => {
    if (!data || !data.length) return null;
    const max = Math.max(...data.flatMap(d=>[d[key1]||0, d[key2]||0]), 1);
    return <div style={{position:'relative',width:'100%',height:height,overflow:'hidden'}}>
      <svg width="100%" height={height} viewBox={`0 0 ${data.length*70} ${height}`} preserveAspectRatio="none" style={{position:'absolute',top:0,left:0}}>
        {data.map((d,i) => {
          const h1 = Math.max(2,((d[key1]||0)/max)*(height-40));
          const h2 = Math.max(2,((d[key2]||0)/max)*(height-40));
          const base = i*70+4;
          return <g key={i}>
            <rect x={base} y={height-40-h1} width={28} height={h1} rx={3} fill="#1B5E3B" opacity={0.9}/>
            <rect x={base+30} y={height-40-h2} width={28} height={h2} rx={3} fill="#3B82F6" opacity={0.75}/>
          </g>;
        })}
      </svg>
      <div style={{position:'absolute',bottom:0,left:0,right:0,display:'flex',height:38}}>
        {data.map((d,i)=><div key={i} style={{flex:1,fontSize:9,color:'var(--txt3)',textAlign:'center',padding:'2px 1px',overflow:'hidden',lineHeight:1.2}}>{(d[labelKey]||'').slice(0,10)}</div>)}
      </div>
    </div>;
  };
  const SimpleAreaChart = ({data, valueKey='current', labelKey='label', height=220}) => {
    if (!data || !data.length) return null;
    const max = Math.max(...data.map(d=>d[valueKey]||0), 1);
    const W = 100/(data.length-1||1);
    const pts = data.map((d,i)=>{
      const x = (i/(data.length-1||1))*100;
      const y = 100-((d[valueKey]||0)/max)*85;
      return `${x},${y}`;
    }).join(' ');
    const area = `0,100 ${pts} 100,100`;
    return <div style={{width:'100%',height:height,position:'relative'}}>
      <svg width="100%" height={height} viewBox="0 0 100 100" preserveAspectRatio="none">
        <defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#1B5E3B" stopOpacity="0.25"/><stop offset="100%" stopColor="#1B5E3B" stopOpacity="0.03"/></linearGradient></defs>
        <polygon points={area} fill="url(#ag)"/>
        <polyline points={pts} fill="none" stroke="#1B5E3B" strokeWidth="1.5" vectorEffect="non-scaling-stroke"/>
        {data.map((d,i)=>{const x=(i/(data.length-1||1))*100;const y=100-((d[valueKey]||0)/max)*85;return <circle key={i} cx={x} cy={y} r="1.5" fill="#1B5E3B" vectorEffect="non-scaling-stroke"/>;})}
      </svg>
      <div style={{position:'absolute',bottom:0,left:0,right:0,display:'flex',justifyContent:'space-between',padding:'0 2px'}}>
        {data.filter((_,i)=>i===0||i===data.length-1||(data.length>4&&i%Math.ceil(data.length/4)===0)).map((d,i)=><span key={i} style={{fontSize:9,color:'var(--txt3)'}}>{d[labelKey]}</span>)}
      </div>
    </div>;
  };

  const COLORS = ['#1B5E3B','#3B82F6','#F59E0B','#EF4444','#8B5CF6','#EC4899','#14B8A6','#F97316'];

  const fetchStats = useCallback(async () => {
    setLoadingData(true); setError('');
    try {
      const r = await fetch(`/api/stats/sales?from=${from}&to=${to}`);
      if (!r.ok) { const e=await r.json(); throw new Error(e.error||`HTTP ${r.status}`); }
      setData(await r.json());
      if (showCmp) {
        const r2 = await fetch(`/api/stats/sales?from=${cmpFrom}&to=${cmpTo}`);
        if (r2.ok) setCmpData(await r2.json()); else setCmpData(null);
      } else { setCmpData(null); }
    } catch(e) { setError(e.message); notify(`Statistikkfeil: ${e.message}`,'error'); }
    finally { setLoadingData(false); }
  }, [from, to, cmpFrom, cmpTo, showCmp, notify]);

  useEffect(() => { fetchStats(); }, []);

  const applyPreset = (i) => { setActivePreset(i); setFrom(PRESETS[i].from); setTo(PRESETS[i].to); };

  const DiffBadge = ({cur, cmp}) => {
    const d = pct(cur, cmp);
    if (d===null) return null;
    const up = +d > 0;
    return <span class={`compare-badge ${up?'up':+d<0?'down':'neutral'}`}>{up?'↑':'↓'}{Math.abs(d)}%</span>;
  };

  const MetricCard = ({label, value, cmpVal, isKr=true}) => {
    const fmt = v => isKr ? krS(v) : Number(v||0).toLocaleString('nb-NO');
    return <div class="cmp-card">
      <div class="cmp-label">{label}</div>
      <div class="cmp-val">{fmt(value)}</div>
      {showCmp && cmpVal!=null && <div class="cmp-diff"><DiffBadge cur={value} cmp={cmpVal}/><span class="txs tm">{cmpFrom.slice(0,4)}→{cmpTo.slice(0,7)}</span></div>}
    </div>;
  };

  const RankList = ({items, valueKey='revenue', labelKey='name', subFn}) => {
    const max = items[0]?.[valueKey] || 1;
    return <>{items.map((item,i) => <div class="rank-row" key={i}>
      <div class={`rank-num ${i<3?'top':''}`}>{i+1}</div>
      <div class="rank-bar-wrap">
        <div class="rank-label">{item[labelKey]}{item.code&&<span class="txs tm"> [{item.code}]</span>}</div>
        <div class="rank-bar-bg"><div class="rank-bar-fill" style={{width:`${(item[valueKey]/max*100).toFixed(1)}%`}}/></div>
      </div>
      <div class="rank-val">{krS(item[valueKey])}<div class="rank-sub">{subFn?subFn(item):''}</div></div>
    </div>)}</>;
  };

  return <>
    <div class="ph">
      <span class="ph-title">Salgsstatistikk</span>
      <div class="ph-acts">
        {data&&!loadingData&&<span class="txs tm">{data.invoiceCount} faktura{data.invoiceCount!==1?'er':''} · {krS(data.totalRevenue)}</span>}
        <button class="btn bp bsm" onClick={fetchStats} disabled={loadingData}>
          <i class={`ti ${loadingData?'ti-loader spin':'ti-refresh'}`}/>{loadingData?'Henter…':'Hent data'}
        </button>
      </div>
    </div>
    <div class="pb">

      {/* Period picker */}
      <div class="period-row">
        <div>
          <div style={{marginBottom:6,fontSize:12,fontWeight:600,color:'var(--txt2)'}}>Velg periode</div>
          <div class="period-preset">
            {PRESETS.map((p,i)=><button key={i} class={`pp-btn ${activePreset===i?'act':''}`} onClick={()=>applyPreset(i)}>{p.label}</button>)}
          </div>
        </div>
        <div class="f ic g2" style={{marginLeft:'auto',flexWrap:'wrap',alignItems:'flex-end'}}>
          <div><label class="fl" style={{fontSize:11}}>Fra</label><input class="fi" type="date" value={from} style={{width:148}} onChange={e=>{setFrom(e.target.value);setActivePreset(-1);}}/></div>
          <div><label class="fl" style={{fontSize:11}}>Til</label><input class="fi" type="date" value={to} style={{width:148}} onChange={e=>{setTo(e.target.value);setActivePreset(-1);}}/></div>
        </div>
        <div class="f ic g2" style={{flexWrap:'wrap',alignItems:'flex-end'}}>
          <label class="f ic g2" style={{fontSize:12,color:'var(--txt2)',cursor:'pointer'}}>
            <input type="checkbox" checked={showCmp} onChange={e=>setShowCmp(e.target.checked)} style={{accentColor:'var(--br)'}}/>
            Sammenlign med:
          </label>
          {showCmp&&<>
            <div><label class="fl" style={{fontSize:11}}>Fra</label><input class="fi" type="date" value={cmpFrom} style={{width:148}} onChange={e=>setCmpFrom(e.target.value)}/></div>
            <div><label class="fl" style={{fontSize:11}}>Til</label><input class="fi" type="date" value={cmpTo} style={{width:148}} onChange={e=>setCmpTo(e.target.value)}/></div>
          </>}
        </div>
      </div>

      {error&&<div class="al warn"><i class="ti ti-alert-triangle"/><span>{error}</span></div>}
      {!data&&!loadingData&&<div class="empty-stats"><i class="ti ti-chart-bar-off"/><p>Klikk <strong>Hent data</strong> for å laste salgsstatistikk fra PowerOffice Go.</p></div>}
      {loadingData&&<div class="empty-stats"><i class="ti ti-loader spin"/><p>Henter fakturadata fra PowerOffice Go…<br/><span class="txs tm">Henter fakturaer og linjer — kan ta noen sekunder.</span></p></div>}
      {data&&!loadingData&&data.invoiceCount===0&&<div class="al info" style={{marginBottom:12}}><i class="ti ti-info-circle"/><div><strong>Ingen fakturaer funnet i demomiljøet for denne perioden.</strong><br/><span class="txs">PowerOffice Go demomiljøet har begrenset testdata. Prøv en lengre periode (f.eks. «Siste 12 mnd» eller «Forrige år»), eller opprett testfakturaer i POGO-demo.</span></div></div>}

      {data&&!loadingData&&<>
        {/* Tabs */}
        <div class="stat-tabs">
          {TABS.map(t=><button key={t.id} class={`stat-tab ${tab===t.id?'act':''}`} onClick={()=>setTab(t.id)}>{t.label}</button>)}
        </div>

        {/* OVERSIKT */}
        {tab==='oversikt'&&<>
          <div class="cmp-grid">
            <MetricCard label="Total omsetning" value={data.totalRevenue} cmpVal={cmpData?.totalRevenue}/>
            <MetricCard label="Antall fakturaer" value={data.invoiceCount} cmpVal={cmpData?.invoiceCount} isKr={false}/>
            <MetricCard label="Solgte enheter" value={data.totalQty} cmpVal={cmpData?.totalQty} isKr={false}/>
            <MetricCard label="Gj.snitt per faktura" value={data.invoiceCount?(data.totalRevenue/data.invoiceCount):0} cmpVal={cmpData?.invoiceCount?(cmpData.totalRevenue/cmpData.invoiceCount):null}/>
          </div>
          {data.byMonth?.length>0&&hasCharts&&<div class="card">
            <div class="card-hd"><span class="card-title">Omsetning over tid</span></div>
            <div style={{padding:'16px 8px'}}>
              <SimpleAreaChart data={data.byMonth.map(m=>({label:m.label,current:m.revenue}))} valueKey="current" labelKey="label" height={220}/>
            </div>
          </div>}
          {data.byProduct?.length>0&&<div class="card">
            <div class="card-hd"><span class="card-title">Topp produkter</span></div>
            <RankList items={data.byProduct.slice(0,5)} subFn={p=>`${p.qty.toLocaleString('nb-NO')} stk · ${p.customerCount} kunder`}/>
          </div>}
          {data.byCustomer?.length>0&&<div class="card">
            <div class="card-hd"><span class="card-title">Topp kunder</span></div>
            <RankList items={data.byCustomer.slice(0,5)} labelKey="name" subFn={c=>`${c.invoiceCount} fakturaer · ${c.productCount} produkter`}/>
          </div>}
        </>}

        {/* PRODUKT */}
        {tab==='produkt'&&<>
          {data.byProduct?.length===0
            ? <div class="empty-stats"><i class="ti ti-package-off"/><p>Ingen produktlinjer funnet i fakturaene for perioden.</p></div>
            : <div class="card">
              <div class="card-hd"><span class="card-title">{data.byProduct.length} produkter — omsetning per produkt</span></div>
              {hasCharts&&<div style={{padding:'16px 8px'}}>
                <SimpleBarChart data={data.byProduct.slice(0,12).map(p=>({label:p.name.length>14?p.name.slice(0,12)+'…':p.name,revenue:p.revenue}))} valueKey="revenue" labelKey="label" height={280}/>
              </div>}
              <table class="dt">
                <thead><tr><th>#</th><th>Produkt</th><th>Kode</th><th style={{textAlign:'right'}}>Antall</th><th style={{textAlign:'right'}}>Omsetning</th><th style={{textAlign:'right'}}>Kunder</th><th style={{textAlign:'right'}}>Fakturaer</th>{showCmp&&cmpData&&<><th style={{textAlign:'right'}}>Forrige per.</th><th style={{textAlign:'right'}}>Endring</th></>}</tr></thead>
                <tbody>{data.byProduct.map((p,i)=>{
                  const cmpP = showCmp&&cmpData ? cmpData.byProduct.find(x=>x.name===p.name) : null;
                  return <tr key={i}>
                    <td class="txs tm">{i+1}</td>
                    <td class="fw5">{p.name}</td>
                    <td class="fmo tsm tm">{p.code||'—'}</td>
                    <td style={{textAlign:'right'}} class="fmo">{p.qty.toLocaleString('nb-NO')}</td>
                    <td style={{textAlign:'right'}} class="fmo fsb">{krS(p.revenue)}</td>
                    <td style={{textAlign:'right'}} class="tsm">{p.customerCount}</td>
                    <td style={{textAlign:'right'}} class="tsm tm">{p.invoiceCount}</td>
                    {showCmp&&cmpData&&<td style={{textAlign:'right'}} class="fmo tsm tm">{cmpP?krS(cmpP.revenue):'—'}</td>}
                    {showCmp&&cmpData&&<td style={{textAlign:'right'}}>{cmpP?<DiffBadge cur={p.revenue} cmp={cmpP.revenue}/>:<span class="txs tm">—</span>}</td>}
                  </tr>;
                })}</tbody>
              </table>
            </div>}
        </>}

        {/* KUNDE */}
        {tab==='kunde'&&<>
          {data.byCustomer?.length===0
            ? <div class="empty-stats"><i class="ti ti-users-group"/><p>Ingen kundeinformasjon funnet for perioden.</p></div>
            : <div class="card">
              <div class="card-hd"><span class="card-title">{data.byCustomer.length} kunder</span></div>
              {hasCharts&&<div style={{padding:'16px 8px'}}>
                <SimpleBarChart data={data.byCustomer.slice(0,12).map(c=>({label:c.name.length>14?c.name.slice(0,12)+'…':c.name,revenue:c.revenue}))} valueKey="revenue" labelKey="label" height={260}/>
              </div>}
              <table class="dt">
                <thead><tr><th>#</th><th>Kunde</th><th style={{textAlign:'right'}}>Fakturaer</th><th style={{textAlign:'right'}}>Enheter</th><th style={{textAlign:'right'}}>Omsetning</th><th style={{textAlign:'right'}}>Produkter</th><th style={{textAlign:'right'}}>Gj.snitt/faktura</th>{showCmp&&cmpData&&<><th style={{textAlign:'right'}}>Forrige per.</th><th style={{textAlign:'right'}}>Endring</th></>}</tr></thead>
                <tbody>{data.byCustomer.map((c,i)=>{
                  const cmpC=showCmp&&cmpData?cmpData.byCustomer.find(x=>x.id===c.id):null;
                  return <tr key={i}>
                    <td class="txs tm">{i+1}</td>
                    <td class="fw5">{c.name}</td>
                    <td style={{textAlign:'right'}} class="tsm">{c.invoiceCount}</td>
                    <td style={{textAlign:'right'}} class="fmo tsm">{c.qty.toLocaleString('nb-NO')}</td>
                    <td style={{textAlign:'right'}} class="fmo fsb">{krS(c.revenue)}</td>
                    <td style={{textAlign:'right'}} class="tsm tm">{c.productCount}</td>
                    <td style={{textAlign:'right'}} class="fmo tsm tm">{krS(c.invoiceCount?c.revenue/c.invoiceCount:0)}</td>
                    {showCmp&&cmpData&&<td style={{textAlign:'right'}} class="fmo tsm tm">{cmpC?krS(cmpC.revenue):'—'}</td>}
                    {showCmp&&cmpData&&<td style={{textAlign:'right'}}>{cmpC?<DiffBadge cur={c.revenue} cmp={cmpC.revenue}/>:<span class="txs tm">Ny</span>}</td>}
                  </tr>;
                })}</tbody>
              </table>
            </div>}
        </>}

        {/* TID */}
        {tab==='tid'&&<>
          {data.byMonth?.length>0&&<div class="card">
            <div class="card-hd"><span class="card-title">Per måned</span></div>
            {hasCharts&&<div style={{padding:'16px 8px'}}>
              <>{showCmp&&cmpData
                ? <SimpleGroupedChart data={(() => {const map={};data.byMonth.forEach(m=>{map[m.key]={label:m.label,current:m.revenue};});cmpData.byMonth.forEach(m=>{if(!map[m.key])map[m.key]={label:m.label,current:0};map[m.key].compare=m.revenue;});return Object.values(map).sort((a,b)=>(a.label||'').localeCompare(b.label||''));})()}  key1="current" key2="compare" labelKey="label" height={260}/>
                : <SimpleBarChart data={data.byMonth.map(m=>({label:m.label,revenue:m.revenue}))} valueKey="revenue" labelKey="label" height={260}/>}
              </>
            </div>}
            <table class="dt">
              <thead><tr><th>Måned</th><th style={{textAlign:'right'}}>Fakturaer</th><th style={{textAlign:'right'}}>Enheter</th><th style={{textAlign:'right'}}>Omsetning</th>{showCmp&&cmpData&&<><th style={{textAlign:'right'}}>Forrige per.</th><th style={{textAlign:'right'}}>Endring</th></>}</tr></thead>
              <tbody>{data.byMonth.map((m,i)=>{
                const cmpM=showCmp&&cmpData?cmpData.byMonth.find(x=>x.key===m.key):null;
                return <tr key={i}>
                  <td class="fw5">{m.label}</td>
                  <td style={{textAlign:'right'}} class="tsm">{m.invoiceCount}</td>
                  <td style={{textAlign:'right'}} class="fmo tsm">{m.qty.toLocaleString('nb-NO')}</td>
                  <td style={{textAlign:'right'}} class="fmo fsb">{krS(m.revenue)}</td>
                  {showCmp&&cmpData&&<td style={{textAlign:'right'}} class="fmo tsm tm">{cmpM?krS(cmpM.revenue):'—'}</td>}
                  {showCmp&&cmpData&&<td style={{textAlign:'right'}}>{cmpM?<DiffBadge cur={m.revenue} cmp={cmpM.revenue}/>:<span class="txs tm">—</span>}</td>}
                </tr>;
              })}</tbody>
            </table>
          </div>}
          {data.byYear?.length>0&&<div class="card">
            <div class="card-hd"><span class="card-title">Per år</span></div>
            {hasCharts&&<div style={{padding:'16px 8px'}}>
              <SimpleBarChart data={data.byYear.map(y=>({label:y.label,revenue:y.revenue}))} valueKey="revenue" labelKey="label" height={180}/>
            </div>}
            <table class="dt">
              <thead><tr><th>År</th><th style={{textAlign:'right'}}>Fakturaer</th><th style={{textAlign:'right'}}>Enheter</th><th style={{textAlign:'right'}}>Omsetning</th></tr></thead>
              <tbody>{data.byYear.map((y,i)=><tr key={i}>
                <td class="fw5">{y.label}</td>
                <td style={{textAlign:'right'}} class="tsm">{y.invoiceCount}</td>
                <td style={{textAlign:'right'}} class="fmo tsm">{y.qty.toLocaleString('nb-NO')}</td>
                <td style={{textAlign:'right'}} class="fmo fsb">{krS(y.revenue)}</td>
              </tr>)}</tbody>
            </table>
          </div>}
        </>}

        {/* FAKTURAER */}
        {tab==='fakturaer'&&<div class="card">
          <div class="card-hd">
            <span class="card-title">{data.invoices?.length} fakturaer — {from} til {to}</span>
          </div>
          {!data.invoices?.length
            ? <div class="empty-stats"><i class="ti ti-receipt-off"/><p>Ingen fakturaer funnet i perioden.</p></div>
            : <table class="dt">
              <thead><tr><th>Faktura nr.</th><th>Dato</th><th>Kunde</th><th style={{textAlign:'right'}}>Linjer</th><th style={{textAlign:'right'}}>Beløp</th><th>Status</th></tr></thead>
              <tbody>{data.invoices.map((inv,i)=><tr key={i}>
                <td class="fmo fsb">{inv.invoiceNo}</td>
                <td class="tsm tm">{fmtD(inv.date)}</td>
                <td class="fw5">{inv.customerName}</td>
                <td style={{textAlign:'right'}} class="tsm tm">{inv.lineCount}</td>
                <td style={{textAlign:'right'}} class="fmo fsb">{krS(inv.totalAmount)}</td>
                <td><span class="bdg bgr">{inv.status||'—'}</span></td>
              </tr>)}</tbody>
            </table>}
        </div>}
      </>}
    </div>
  </>;
}

function Shell(){
  const {conn,connErr,orders,dbReady}=useApp();
  const [page,setPage]=useState('products');
  const [col,setCol]=useState(false);
  const Active=COMPS[page]||Products;
  if(!dbReady) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',flexDirection:'column',gap:12,color:'var(--txt3)',fontFamily:'var(--font)'}}>
    <i class="ti ti-database" style={{fontSize:36}}/>
    <div style={{fontSize:14}}>Laster data fra database…</div>
  </div>;
  return <div class="app">
    <aside class={`sb ${col?'c':''}`}>
      <div class="sb-hd">
        <div class="logo"><i class="ti ti-building-warehouse"/>{!col&&<span>Ambio Innkjøp<br/><small>og varer</small></span>}</div>
        <button class="sb-tog" onClick={()=>setCol(v=>!v)} title="Veksle meny"><i class={`ti ${col?'ti-layout-sidebar-left-expand':'ti-layout-sidebar-left-collapse'}`}/></button>
      </div>
      <div class={`conn-pill ${conn==='ok'?'ok':conn==='error'?'err':'loading'}`}>
        <i class={`ti ${conn==='ok'?'ti-circle-check':conn==='error'?'ti-alert-circle':'ti-loader spin'}`} style={{fontSize:13,flexShrink:0}}/>
        {!col&&<span>{conn==='ok'?'PowerOffice Go tilkoblet':conn==='error'?'Tilkoblingsfeil':'Kobler til…'}</span>}
      </div>
      <nav class="sb-nav">
        {PAGES.map((p,i)=>{
          const prev=PAGES[i-1];
          return <div key={p.id}>
            {p.sec&&p.sec!==prev?.sec&&!col&&<div class="nav-sec">{p.sec}</div>}
            <button class={`nav-btn ${page===p.id?'act':''}`} onClick={()=>setPage(p.id)} title={col?p.label:undefined}>
              <i class={`ti ${p.icon}`}/>
              {!col&&<span>{p.label}</span>}
              {p.id==='orders'&&(()=>{const pend=orders.filter(o=>o.status==='pending_approval').length;const total=orders.length;return pend>0?<span class="nav-bdg">{pend}⚡</span>:total>0?<span class="nav-bdg">{total}</span>:null;})()}
            </button>
          </div>;
        })}
      </nav>
      {conn==='error'&&!col&&<div style={{margin:8,padding:'9px 10px',background:'var(--dnl)',border:'1px solid rgba(185,28,28,.2)',borderRadius:'var(--rs)',fontSize:11,color:'var(--dn)'}}>
        <i class="ti ti-alert-triangle"/> {connErr}
      </div>}
    </aside>
    <main class="main"><Active/></main>
    <Notifications/>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<AppProvider><Shell/></AppProvider>);
</script>
</body>
</html>
